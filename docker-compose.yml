x-postgres-credentials: &postgres-credentials
  POSTGRES_DB: ${POSTGRES_DB:-app_db}
  POSTGRES_USER: ${POSTGRES_USER:-app_user}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app_password}

x-app-database-env: &app-database-env
  <<: *postgres-credentials
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-app_user}:${POSTGRES_PASSWORD:-app_password}@postgres:5432/${POSTGRES_DB:-app_db}

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      <<: *postgres-credentials
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app_user} -d ${POSTGRES_DB:-app_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *app-database-env
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET: ${JWT_SECRET:-change_me_to_a_long_random_secret}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      MEDIA_ROOT: ${MEDIA_ROOT:-/media}
      YTDLP_COOKIES_FILE: ${YTDLP_COOKIES_FILE:-}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - ./media:/media
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    environment:
      <<: *app-database-env
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET: ${JWT_SECRET:-change_me_to_a_long_random_secret}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      MEDIA_ROOT: ${MEDIA_ROOT:-/media}
      YTDLP_COOKIES_FILE: ${YTDLP_COOKIES_FILE:-}
    command: celery -A celery_app.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
      - ./media:/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    command: npm run dev -- --host 0.0.0.0 --port 5173
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

  telegram_bot:
    build:
      context: ./telegram_bot
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      API_BASE_URL: ${API_BASE_URL:-http://backend:8000}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    command: python bot.py
    volumes:
      - ./telegram_bot:/app
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
